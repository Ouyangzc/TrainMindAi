<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>方向 B · 课程学习型</title><link rel="stylesheet" href="shared.css">
<style>
 body{background:#f7faf9}.b-wrap{width:min(1180px,calc(100% - 32px));margin:auto;padding:30px 0 60px}.course-hero{position:relative;overflow:hidden;padding:34px;border-radius:22px;background:linear-gradient(118deg,#0b6b62,#16a394);color:#fff;box-shadow:0 20px 50px rgba(13,148,136,.2)}.course-hero:after{content:'737';position:absolute;right:30px;top:-28px;color:rgba(255,255,255,.08);font-size:180px;font-weight:900}.course-hero h1{position:relative;margin:8px 0;font-size:34px}.course-hero p{position:relative;max-width:690px;margin:0;line-height:1.7;color:#d9fffa}.hero-row{position:relative;display:flex;align-items:center;justify-content:space-between;margin-top:26px}.progress{width:360px}.progress-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:13px}.track{height:9px;border-radius:99px;background:rgba(255,255,255,.25)}.track i{display:block;width:38%;height:100%;border-radius:99px;background:#fff}.continue{padding:12px 20px;border:0;border-radius:11px;background:#fff;color:#08776b;font-weight:800;cursor:pointer}
 .layout{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:20px;margin-top:22px}.card{border:1px solid #e4ebe8;border-radius:17px;background:#fff}.card-head{display:flex;align-items:center;justify-content:space-between;padding:20px 22px;border-bottom:1px solid #eef2f0}.card-head h2{margin:0;font-size:19px}.chapter{border-bottom:1px solid #edf1ef}.chapter:last-child{border:0}.chapter-title{display:flex;align-items:center;gap:13px;padding:18px 22px;cursor:pointer}.chapter-num{display:grid;width:34px;height:34px;place-items:center;border-radius:50%;background:#e8f7f4;color:#0d9488;font-weight:850}.chapter-title strong{flex:1}.chapter-title small{color:#98a2b3}.resources{display:none;padding:0 22px 18px 69px}.chapter.open .resources{display:block}.resource{display:flex;align-items:center;gap:10px;padding:11px 0;color:#475467}.resource:before{content:'✓';display:grid;width:20px;height:20px;place-items:center;border-radius:50%;background:#dff6f1;color:#0d9488;font-size:11px}.resource button{margin-left:auto;border:0;background:none;color:#0d9488;cursor:pointer}.side-card{padding:20px}.side-card h3{margin:0 0 16px}.mentor{display:flex;align-items:center;gap:12px;padding-bottom:18px;border-bottom:1px solid #edf1ef}.mentor-avatar{display:grid;width:48px;height:48px;place-items:center;border-radius:14px;background:#fef0d7;color:#b76e00;font-weight:900}.notice{margin-top:16px;padding:14px;border-radius:12px;background:#fff8e9;color:#8c5b00;font-size:13px;line-height:1.6}.deadline{margin-top:18px}.deadline b{display:block;margin-top:5px;font-size:18px}.mini-course{margin-top:20px;padding:18px;border:1px solid #e4ebe8;border-radius:17px;background:#fff}.mini-course span{font-size:12px;color:#0d9488;font-weight:800}.mini-course h3{margin:8px 0}.course-tabs{display:flex;gap:20px;margin:26px 2px 0}.course-tabs button{padding:10px 3px;border:0;border-bottom:2px solid transparent;background:none;color:#667085;cursor:pointer}.course-tabs button.active{border-color:#0d9488;color:#08776b;font-weight:800}
 @media(max-width:850px){.layout{grid-template-columns:1fr}.hero-row{align-items:flex-start;gap:20px;flex-direction:column}.progress{width:100%}.course-hero{padding:25px}.resources{padding-left:24px}}

<header class="topbar"><div class="brand"><div class="brand-mark" style="background:#0d9488">T</div>TrainMind 学习中心</div><nav class="prototype-switch"><a href="direction-a.html">A 资料中心</a><a class="active" href="direction-b.html">B 课程学习</a><a href="direction-c.html">C AI 助教</a></nav><div class="top-actions"><a class="back-gallery" href="index.html">方向选择</a><div class="avatar">林</div></div></header>
<main class="b-wrap"><section class="course-hero"><div class="eyebrow" style="color:#a7fff4">DIRECTION B · LEARNING PATH</div><h1>B737 基础维修培训</h1><p>掌握飞机主要系统组成、航线维护程序与安全操作要求。当前学习内容来自知识库正式发布版本 V3。</p><div class="hero-row"><div class="progress"><div class="progress-label"><span>整体学习进度</span><b>38%</b></div><div class="track"><i></i></div></div><button class="continue" onclick="openChapter(2)">继续学习 · 液压系统 →</button></div></section>
<div class="course-tabs"><button class="active">学习路径</button><button onclick="alert('原型：切换到全部资料')">全部资料</button><button onclick="alert('原型：切换到课程问答')">课程问答</button></div>
<div class="layout"><section class="card"><div class="card-head"><h2>课程学习路径</h2><span class="tag" style="background:#e8f7f4;color:#08776b">4 个章节 · 8 份资料</span></div><div id="chapters"></div></section>
<aside><section class="card side-card"><h3>课程负责人</h3><div class="mentor"><div class="mentor-avatar">周</div><div><b>周明远</b><div class="muted" style="font-size:13px;margin-top:4px">机务培训讲师</div></div></div><div class="deadline"><span class="muted">授权有效期至</span><b>2026-12-31</b></div><div class="notice">课程知识库已于 7 月 20 日更新。液压系统章节新增一份维护手册。</div></section><section class="mini-course"><span>下一门课程</span><h3>机坪安全规范</h3><div class="muted">4 份资料 · 尚未开始</div></section></aside></div></main>
<script>
const chapters=[{n:'01',name:'飞机系统概述',done:'已完成',docs:['B737 飞机系统概述','飞机区域与编号规则']},{n:'02',name:'液压系统原理与维护',done:'学习中 · 50%',docs:['液压系统工作原理','液压系统维护手册','常见故障与处置']},{n:'03',name:'动力装置与检查',done:'未开始',docs:['发动机日常检查手册','动力装置安全注意事项']},{n:'04',name:'航线维护程序',done:'未开始',docs:['航线检查项目清单']}];
document.querySelector('#chapters').innerHTML=chapters.map((x,i)=>`<article class="chapter ${i===1?'open':''}" id="chapter-${i}"><div class="chapter-title" onclick="toggleChapter(${i})"><div class="chapter-num">${x.n}</div><strong>${x.name}</strong><small>${x.done}</small><span>⌄</span></div><div class="resources">${x.docs.map(d=>`<div class="resource">${d}<button onclick="event.stopPropagation();alert('原型：打开学习资料')">学习</button></div>`).join('')}</div></article>`).join('');function toggleChapter(i){document.querySelector('#chapter-'+i).classList.toggle('open')}function openChapter(i){document.querySelectorAll('.chapter').forEach(x=>x.classList.remove('open'));document.querySelector('#chapter-'+(i-1)).classList.add('open');document.querySelector('#chapter-'+(i-1)).scrollIntoView({behavior:'smooth'})}
</script></body></html>
